<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>午夜邮局·最后一次通话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000000; color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Roboto", sans-serif; font-size: 16px; line-height: 1.8; text-align: center; width: 100vw; height: 100vh; overflow: hidden; position: fixed; touch-action: none; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.5s ease; background-color: #000000; padding: 20px; box-sizing: border-box; }
        .page.active { opacity: 1; visibility: visible; z-index: 10; }
        .text-line { display: block; margin: 0.5rem 0; animation: breatheFade 2s ease-in-out forwards; opacity: 0; word-break: break-word; max-width: 12em; margin-left: auto; margin-right: auto; }
        @keyframes breatheFade { 0% { opacity: 0; } 100% { opacity: 1; } }
        .text-button { color: #FFFFFF; background: none; border: none; font-size: 16px; line-height: 1.8; cursor: pointer; margin: 1rem 0; padding: 8px 0; font-family: inherit; transition: opacity 0.2s; display: inline-block; }
        .text-button:active { opacity: 0.7; }
        
        /* 美化通话界面样式 */
        .call-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 15;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px 80px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease;
        }
        .call-ui.active {
            opacity: 1;
            visibility: visible;
        }
        .call-status {
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
        }
        .call-avatar {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 40px 0;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .call-avatar::after {
            content: "📞";
            font-size: 48px;
            opacity: 0.8;
        }
        .call-timer {
            font-size: 28px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-bottom: 30px;
        }
        .call-decor-hangup {
            font-size: 12px;
            color: rgba(255,100,100,0.6);
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 30px;
            width: auto;
            display: inline-block;
            pointer-events: none;  /* 纯装饰，不可点击 */
        }
        /* 心跳光晕覆盖在美化层之上 */
        #heartbeatCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 25;
            display: none;
        }
        .heartbeat-active #heartbeatCanvas {
            display: block;
        }
        /* 其他页面样式保持不变 */
        .camera-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 30; transform: scaleX(-1); display: none; }
        .camera-layer.active { display: block; }
        .camera-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 31; pointer-events: none; }
        .camera-layer.active + .camera-overlay { pointer-events: auto; }
        .escape-text { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 6px; color: #1a1a1a; z-index: 32; pointer-events: none; }
        .hold-to-exit { position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 33; pointer-events: auto; }
        .payment-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .payment-box { background: #111; padding: 30px; border-radius: 12px; width: 80%; text-align: center; }
        .card-preview { background: #1a1a1a; padding: 20px; margin: 20px; border-radius: 16px; }
        textarea { width: 90%; background: #222; color: white; border: 1px solid #444; padding: 12px; font-size: 16px; margin: 15px 0; font-family: monospace; }
        .loading-toast { position: fixed; bottom: 30px; left: 20%; width: 60%; background: rgba(255,255,255,0.2); color: white; padding: 8px; border-radius: 20px; font-size: 14px; text-align: center; z-index: 300; }
    </style>
</head>
<body>
    <!-- 微信引导页 -->
    <div id="wechatGuide" class="page"><div style="max-width:280px;"><div class="text-line">这是一次需要</div><div class="text-line">全屏、安静、不被打扰的通话</div><div class="text-line" style="margin-top:24px;">微信太吵了</div><div class="text-line" style="margin-top:24px;">请点击右上角</div><div class="text-line">选择「在浏览器中打开」</div><div class="text-line">我们在那里等你</div></div></div>
    <!-- 序章 -->
    <div id="prologuePage" class="page"><div id="prologueText"></div><button id="acceptBtn" class="text-button" style="margin-top:48px;">我接受，开始通话</button></div>
    <!-- 通话中 - 原始空白页（用于控制心跳active） -->
    <div id="callPage" class="page"></div>
    <!-- 美化通话界面 -->
    <div id="callUI" class="call-ui">
        <div class="call-status">通话中 • 边缘心跳与你同步</div>
        <div class="call-avatar"></div>
        <div class="call-timer" id="callTimer">00:00</div>
        <div class="call-decor-hangup">· 仅作装饰 ·</div>
    </div>
    <!-- 摄像头及其他 -->
    <video id="cameraVideo" class="camera-layer" autoplay playsinline muted></video>
    <div class="camera-overlay" id="cameraOverlay"><div class="escape-text">按住屏幕，回到黑暗</div><div class="hold-to-exit" id="holdToExit"></div></div>
    <div id="epiloguePage" class="page"><div id="epilogueText"></div></div>
    <div id="conversionPage" class="page"><div id="conversionContent"></div></div>
    <canvas id="heartbeatCanvas"></canvas>
    <script>
        (function(){
            let currentPage = null;
            let wakeLockSentinel = null;
            let mediaStream = null;
            let heartRateBPM = 75;
            let heartRateValid = false;
            let animationFrameId = null;
            let timerAutoNext = null;
            let heartRateHistory = [];
            let videoElement = document.getElementById('cameraVideo');
            let canvasHeart = document.getElementById('heartbeatCanvas');
            let ctxHeart = canvasHeart.getContext('2d');
            let greenValues = [];
            let isExiting = false;
            let callAudio = null;
            let isPrologueFinished = false;
            let jumpExecuted = false;
            let progressInterval = null;
            let callStartTime = 0;
            let timerInterval = null;
            
            // 美化UI元素
            const callUIDiv = document.getElementById('callUI');
            const callTimerSpan = document.getElementById('callTimer');
            
            function hardExitAndClear() { if(isExiting) return; isExiting=true; stopAllMedia(); releaseWakeLock(); clearAllLocalData(); document.body.innerHTML=''; window.location.replace('about:blank'); }
            function clearAllLocalData() { if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop()); if(callAudio) { callAudio.pause(); callAudio = null; } if(animationFrameId) cancelAnimationFrame(animationFrameId); if(timerAutoNext) clearTimeout(timerAutoNext); if(progressInterval) clearInterval(progressInterval); if(timerInterval) clearInterval(timerInterval); localStorage.clear(); sessionStorage.clear(); try{ window.location.hash=''; }catch(e){} }
            function stopAllMedia() { if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop()); if(videoElement && videoElement.srcObject) { videoElement.srcObject.getTracks().forEach(t=>t.stop()); videoElement.srcObject=null; } if(callAudio) { callAudio.pause(); callAudio = null; } }
            async function requestWakeLock() { try { if('wakeLock' in navigator) wakeLockSentinel = await navigator.wakeLock.request('screen'); } catch(e){} }
            function releaseWakeLock() { if(wakeLockSentinel) wakeLockSentinel.release(); }
            
            async function initHeartRateMonitor(stream) {
                if(!stream) return;
                videoElement.srcObject = stream;
                await videoElement.play();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const processFrame = () => {
                    if(!videoElement.videoWidth || !heartRateValid) { animationFrameId = requestAnimationFrame(processFrame); return; }
                    canvas.width = videoElement.videoWidth;
                    canvas.height = videoElement.videoHeight;
                    ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    let g=0, count=0;
                    for(let i=0;i<imageData.data.length;i+=10){ g+=imageData.data[i+1]; count++; }
                    const avgGreen = g/count;
                    const now = Date.now();
                    greenValues.push({value: avgGreen, time: now});
                    while(greenValues.length > 300) greenValues.shift();
                    if(greenValues.length > 60) {
                        let peaks = 0;
                        for(let i=1;i<greenValues.length-1;i++) if(greenValues[i].value > greenValues[i-1].value && greenValues[i].value > greenValues[i+1].value) peaks++;
                        let duration = (greenValues[greenValues.length-1].time - greenValues[0].time)/1000;
                        let estimatedHR = (peaks/duration)*60;
                        if(estimatedHR>50 && estimatedHR<150) { heartRateBPM = Math.round(estimatedHR); heartRateHistory.push(heartRateBPM); if(heartRateHistory.length>5) heartRateHistory.shift(); heartRateValid = true; }
                        else if(heartRateHistory.length>0) heartRateBPM = heartRateHistory.reduce((a,b)=>a+b,0)/heartRateHistory.length;
                    }
                    animationFrameId = requestAnimationFrame(processFrame);
                };
                videoElement.addEventListener('play', ()=>{ processFrame(); });
            }
            
            function drawHeartBeat() {
                if(!canvasHeart) return;
                const w = window.innerWidth, h = window.innerHeight;
                canvasHeart.width = w; canvasHeart.height = h;
                ctxHeart.clearRect(0,0,w,h);
                let intensity = 0.4 + (Math.sin(Date.now() * 0.015 * (heartRateBPM/60)) * 0.3);
                let alpha = Math.min(0.9, 0.3 + intensity * 0.5);
                let color = heartRateBPM > 100 ? `rgba(255, 204, 204, ${alpha})` : `rgba(204, 238, 255, ${alpha})`;
                ctxHeart.strokeStyle = color;
                ctxHeart.lineWidth = 2;
                ctxHeart.strokeRect(2,2,w-4,h-4);
                requestAnimationFrame(()=>setTimeout(drawHeartBeat, 50));
            }
            
            // 启动通话计时器
            function startCallTimer() {
                callStartTime = Date.now();
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if (currentPage !== 'call') return;
                    const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    callTimerSpan.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                }, 1000);
            }
            
            async function playCallAudio() {
                if (callAudio) {
                    callAudio.pause();
                    callAudio = null;
                }
                callAudio = new Audio('call.mp3');
                callAudio.preload = 'auto';
                callAudio.loop = false;
                callAudio.volume = 0.8;
                
                const safeJump = () => {
                    if (jumpExecuted) return;
                    jumpExecuted = true;
                    if (progressInterval) clearInterval(progressInterval);
                    if (timerInterval) clearInterval(timerInterval);
                    if (currentPage === 'call') {
                        console.log('跳转到镜中之我');
                        goToMirrorPage();
                    }
                };
                
                callAudio.addEventListener('ended', safeJump);
                callAudio.addEventListener('error', (e) => {
                    console.error('音频错误', e);
                    safeJump();
                });
                
                // 进度检测
                progressInterval = setInterval(() => {
                    if (!callAudio || callAudio.ended) return;
                    const duration = callAudio.duration;
                    const current = callAudio.currentTime;
                    if (duration && !isNaN(duration) && current >= duration - 0.1) {
                        safeJump();
                    }
                }, 200);
                
                // 后备定时器
                let fallbackTimer = setTimeout(() => {
                    console.log('后备定时器触发');
                    safeJump();
                }, 180000);
                callAudio.addEventListener('loadedmetadata', () => {
                    const durationMs = callAudio.duration * 1000;
                    if (durationMs > 0 && durationMs < 600000) {
                        clearTimeout(fallbackTimer);
                        fallbackTimer = setTimeout(safeJump, durationMs + 1500);
                    }
                });
                
                try {
                    await callAudio.play();
                    startCallTimer(); // 开始计时
                } catch (err) {
                    console.error('自动播放失败', err);
                    safeJump();
                }
            }
            
            function showPage(pageId) {
                document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
                const target = document.getElementById(pageId);
                if(target) target.classList.add('active');
                currentPage = pageId;
                if(pageId === 'callPage') {
                    document.body.classList.add('heartbeat-active');
                    // 显示美化UI
                    callUIDiv.classList.add('active');
                } else {
                    document.body.classList.remove('heartbeat-active');
                    callUIDiv.classList.remove('active');
                    if(timerInterval) clearInterval(timerInterval);
                }
                if(pageId === 'prologuePage') animatePrologue();
                if(pageId === 'epiloguePage') animateEpilogue();
                if(pageId === 'conversionPage') renderConversion();
            }
            
            function animatePrologue() {
                const container = document.getElementById('prologueText');
                const prologueLines = ["接下来的3分钟","是一通电话的录音","","电话那头","是一个决定去死的人","","你无法救她","也无法离开","","你只能听","","如果你愿意","请将手指放在摄像头上","","你的心跳","会成为这段音频的背景音乐","","所有数据留在你的手机里","通话结束后自动销毁",""];
                container.innerHTML = '';
                let idx = 0;
                function showNext() {
                    if(idx >= prologueLines.length) {
                        isPrologueFinished = true;
                        return;
                    }
                    if(prologueLines[idx].trim() !== '') {
                        const div = document.createElement('div');
                        div.className = 'text-line';
                        div.innerText = prologueLines[idx];
                        container.appendChild(div);
                    } else {
                        const br = document.createElement('div');
                        br.style.height = '1rem';
                        container.appendChild(br);
                    }
                    idx++;
                    setTimeout(showNext, idx === prologueLines.length ? 200 : 1800);
                }
                showNext();
            }
            
            function animateEpilogue() {
                const container = document.getElementById('epilogueText');
                const epilogueLines = ["她没有说为什么","","但你的心跳","为这3分钟的沉默","打上了独属于你的节拍","","这就是你存在过的证明"];
                container.innerHTML = '';
                let idx=0;
                function nextLine(){
                    if(idx>=epilogueLines.length){ setTimeout(()=>{ showPage('conversionPage'); },2000); return; }
                    if(epilogueLines[idx].trim()!==''){ const d=document.createElement('div'); d.className='text-line'; d.innerText=epilogueLines[idx]; container.appendChild(d); }
                    else { const br=document.createElement('div'); br.style.height='1rem'; container.appendChild(br); }
                    idx++; setTimeout(nextLine,1600);
                }
                nextLine();
            }
            
            async function requestCameraForHeart() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 480 }, facingMode: "user" } });
                    mediaStream = stream;
                    await initHeartRateMonitor(stream);
                    heartRateValid = true;
                    drawHeartBeat();
                    return true;
                } catch(e) {
                    console.error('摄像头错误', e);
                    heartRateValid = false;
                    return false;
                }
            }
            
            async function goToMirrorPage() {
                if(!videoElement.srcObject && mediaStream) videoElement.srcObject = mediaStream;
                if(videoElement.srcObject) {
                    try { await videoElement.play(); } catch(e) { console.warn(e); }
                }
                videoElement.classList.add('active');
                const overlay = document.createElement('canvas');
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:35;pointer-events:none;';
                document.body.appendChild(overlay);
                let hr = heartRateValid? heartRateBPM : 75;
                let effectType = hr<70 ? 'graySmoke' : (hr>=100 ? 'redDots' : 'glass');
                const ctxOver = overlay.getContext('2d');
                function drawEffect() {
                    if(!overlay.parentNode) return;
                    ctxOver.clearRect(0,0,window.innerWidth,window.innerHeight);
                    if(effectType === 'graySmoke'){ ctxOver.fillStyle='rgba(80,80,80,0.2)'; ctxOver.fillRect(0,0,window.innerWidth,window.innerHeight); }
                    else if(effectType === 'glass'){ for(let i=0;i<100;i++){ ctxOver.fillStyle=`rgba(255,255,255,${Math.random()*0.3})`; ctxOver.fillRect(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 8,8); } }
                    else { for(let i=0;i<60;i++){ ctxOver.fillStyle=`rgba(255,0,0,${Math.random()*0.5})`; ctxOver.beginPath(); ctxOver.arc(Math.random()*window.innerWidth, Math.random()*window.innerHeight, 3,0,Math.PI*2); ctxOver.fill(); } }
                    requestAnimationFrame(drawEffect);
                }
                drawEffect();
                const holdDiv = document.getElementById('holdToExit');
                let timerHold;
                const startHold = () => { timerHold = setTimeout(()=>{ overlay.remove(); videoElement.classList.remove('active'); showPage('epiloguePage'); }, 500); };
                const cancelHold = () => clearTimeout(timerHold);
                holdDiv.addEventListener('touchstart', startHold);
                holdDiv.addEventListener('touchend', cancelHold);
                setTimeout(()=>{ if(overlay) overlay.remove(); if(videoElement.classList.contains('active')){ videoElement.classList.remove('active'); showPage('epiloguePage'); } }, 3000);
            }
            
            function renderConversion() {
                const container = document.getElementById('conversionContent');
                container.innerHTML = `<div class="text-line">这3分钟的心跳</div><div class="text-line">是你独有的</div><div class="text-line">你可以选择保存它</div><div class="text-line">或者让它永远消失</div><button id="deleteBtn" class="text-button">让它消失</button><button id="saveHeartBtn" class="text-button">保存我的心跳</button>`;
                document.getElementById('deleteBtn')?.addEventListener('click', ()=>{ clearAllLocalData(); alert('晚安。'); setTimeout(()=>hardExitAndClear(),500); });
                document.getElementById('saveHeartBtn')?.addEventListener('click', ()=>{ showPaymentPopup(); });
            }
            function showPaymentPopup() {
                const div = document.createElement('div'); div.className='payment-overlay';
                div.innerHTML = `<div class="payment-box"><div>支付 9.9 元</div><button id="mockPay" class="text-button">确认支付</button><button id="cancelPay" class="text-button">取消</button></div>`;
                document.body.appendChild(div);
                document.getElementById('mockPay')?.addEventListener('click',()=>{ div.remove(); generateHeartCard(); });
                document.getElementById('cancelPay')?.addEventListener('click',()=>div.remove());
            }
            function generateHeartCard() {
                const hrDisplay = heartRateValid ? heartRateBPM : 0;
                const cardData = { time: new Date().toISOString(), heartRate: hrDisplay, message: "午夜通话·心跳纪念" };
                const encStr = btoa(unescape(encodeURIComponent(JSON.stringify(cardData)))).substring(0,32);
                window.location.hash = encStr;
                const convDiv = document.getElementById('conversionContent');
                convDiv.innerHTML = `<div class="card-preview">纪念卡已生成<br/>心率:${hrDisplay>0?hrDisplay:'未捕捉到,但她感受到你'}<br/><button id="downloadCardBtn" class="text-button">下载图片</button><br/><button id="letterBtn" class="text-button">写一封信给一年后的自己</button></div>`;
                document.getElementById('downloadCardBtn')?.addEventListener('click',()=>{ alert('模拟下载卡片'); window.location.hash=''; clearAllLocalData(); hardExitAndClear(); });
                document.getElementById('letterBtn')?.addEventListener('click', showLetterBox);
            }
            function showLetterBox() {
                const container = document.getElementById('conversionContent');
                container.innerHTML = `<textarea id="letterInput" placeholder="写一封信..."></textarea><button id="submitLetter" class="text-button">提交</button>`;
                document.getElementById('submitLetter')?.addEventListener('click',()=>{
                    const key = Math.random().toString(36).substr(2,12);
                    alert(`这是你取回信件的唯一凭证: ${key}\n请自己记住。`);
                    clearAllLocalData(); hardExitAndClear();
                });
            }
            
            async function onAccept() {
                const btn = document.getElementById('acceptBtn');
                if (btn.disabled) return;
                btn.disabled = true;
                btn.style.opacity = '0.5';
                const toast = document.createElement('div');
                toast.className = 'loading-toast';
                toast.innerText = '正在准备，请稍候...';
                document.body.appendChild(toast);
                try {
                    if (!isPrologueFinished) {
                        toast.innerText = '请等待序章结束...';
                        await new Promise(resolve => {
                            const check = setInterval(() => {
                                if (isPrologueFinished) {
                                    clearInterval(check);
                                    resolve();
                                }
                            }, 200);
                        });
                    }
                    toast.innerText = '正在请求摄像头...';
                    await requestWakeLock();
                    const granted = await requestCameraForHeart();
                    if (!granted) {
                        alert("无法获取摄像头权限，你可以继续体验但无心率监测。");
                    }
                    toast.innerText = '开始通话...';
                    showPage('callPage');
                    await playCallAudio();
                } catch (err) {
                    console.error(err);
                    alert('启动失败，请刷新重试');
                    hardExitAndClear();
                } finally {
                    toast.remove();
                    btn.disabled = false;
                }
            }
            
            if(/MicroMessenger/i.test(navigator.userAgent)) {
                document.getElementById('wechatGuide').classList.add('active');
            } else {
                showPage('prologuePage');
                const acceptBtn = document.getElementById('acceptBtn');
                acceptBtn.addEventListener('click', onAccept);
                acceptBtn.style.opacity = '1';
            }
            
            window.addEventListener('popstate', ()=>{ hardExitAndClear(); });
            history.pushState(null, null, location.href);
            window.addEventListener('beforeunload', ()=>{ clearAllLocalData(); });
        })();
    </script>
</body>
</html>
